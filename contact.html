<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact</title>
    <style>
        body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: rgb(249, 247, 247);
    }

    .contact-container {
        max-width: 1100px;
        margin: 50px auto;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 40px;
    }

    .contact-wrapper {
        display: grid;u
        grid-template-columns: 1fr 1fr;
        gap: 40px;
    }

    /* Contact Info Section */
    .contact-info {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .contact-info h2 {
        margin-bottom: 20px;
        color: #333;
    }

    .contact-info p {
        margin: 10px 0;
        color: #555;
    }


    /* Contact Form */
    .contact-form {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .contact-form h2 {
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
    }

    .form-group textarea {
        resize: none;
        height: 120px;
    }

    .btn-submit {
        background: #007BFF;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s ease;
    }

    .btn-submit:hover {
        background: #0056b3;
    }

    /* Responsive */
    @media(max-width: 768px) {
        .contact-wrapper {
            grid-template-columns: 1fr;
        }
    }
    </style>
</head>
<body>
  <div class="contact-container">
    <h1>Contact Us</h1>

    <div class="contact-wrapper">

        <!-- Contact Information -->
        <div class="contact-info">
            <h2>Our Office</h2>
            <p><strong>Address:</strong> 456 Business Street, Nairobi, Kenya</p>
            <p><strong>Phone:</strong> +254 700 000 000</p>
            <p><strong>Email:</strong> info@ecocyclesolutions.co.ke</p>
            <p><strong>Business Hours:</strong><br>
                Monday - Friday: 8:00 AM - 5:00 PM<br>
                Saturday: 9:00 AM - 2:00 PM<br>
                Sunday: Closed
            </p>
            
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="form-group">
                    <input type="tel" name="phone" placeholder="Phone Number">
                </div>

                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>

    </div>
</div>
  
</body>
</html>
